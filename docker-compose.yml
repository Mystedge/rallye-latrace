# Déploiement via le gestionnaire Docker de Hostinger (template "Docker and Traefik").
# -> Colle l'URL BRUTE de ce fichier dans l'interface ; Hostinger configure Traefik + HTTPS.
# L'image est construite automatiquement par GitHub Actions à chaque push (ghcr.io).
# Les secrets (mot de passe admin, clé IA) se renseignent dans l'interface Hostinger, pas ici.
#
# Déploiement en ligne de commande possible aussi :
#   git clone https://github.com/Mystedge/rallye-latrace.git && cd rallye-latrace
#   cp .env.example .env   (éditer les secrets)   puis   docker compose up -d

services:
  app:
    image: ghcr.io/mystedge/rallye-latrace:latest
    restart: unless-stopped
    environment:
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin}
      - SESSION_SECRET=${SESSION_SECRET:-changez-moi}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
    volumes:
      - rallye-data:/data      # base SQLite + photos (persistant, survit aux mises à jour)
    expose:
      - "3000"                 # port interne de l'app (Traefik route dessus)

volumes:
  rallye-data:
